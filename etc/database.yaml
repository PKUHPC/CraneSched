# EmbeddedDb settings
# BerkeleyDB, Unqlite(default), or RocksDB
CraneEmbeddedDbBackend: Unqlite
# File path of CraneCtld embeded DB (Relative to CraneBaseDir, when set Keepalived, Relative to CraneSharedBaseDir)
CraneCtldDbPath: cranectld/embedded.db
RocksDb:
  SyncWrites: true
  ManualWalSyncIntervalMs: 1000
  WriteBufferSizeMB: 64
  MaxWriteBufferNumber: 4
  TargetFileSizeBaseMB: 64
  MaxBackgroundJobs: 4
  Compression: lz4

# Mongodb settings
DbUser: admin
DbPassword: "123456"
DbHost: localhost
DbPort: 27017
DbReplSetName: crane_rs
DbName: crane_db
# Job aggregation timeout in milliseconds for MongoDB operations.
JobAggregationTimeoutMs: 600000
# Job aggregation batch size for MongoDB operations.
JobAggregationBatchSize: 100
# Job final records are written synchronously; acc_usage aggregation can be
# moved to a crash-recoverable background worker.
JobAggregationMode: async
JobAggregationWorkerBatchSize: 500
JobAggregationPollIntervalMs: 200
JobAggregationRetryBackoffMs: 500
JobAggregationMaxRetryBackoffMs: 10000

Vault:
  Enabled: false
  Addr: 127.0.0.1
  Port: 8200
  Username: admin
  Password: "123456"
  Tls: false
  ExpirationMinutes: 30
