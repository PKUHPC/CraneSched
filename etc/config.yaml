# Cluster settings (This must be identical across all nodes)
# the hostname of node which is running cranectld
ControlMachine: cn15
# the name of this cluster
ClusterName: pkuhpc_test

# Other configurations to be used
DbConfigPath: /etc/crane/database.yaml

# Data storage settings
CraneBaseDir: /var/crane/

# Tls settings
TLS:
  Enabled: false
  InternalCertFilePath: /etc/crane/tls/internal.pem
  InternalKeyFilePath: /etc/crane/tls/internal.key
  ExternalCertFilePath: /etc/crane/tls/external.pem
  ExternalKeyFilePath: /etc/crane/tls/external.key
  CaFilePath: /etc/crane/tls/ca.pem
  AllowedNodes: "cn[15-18]"
  DomainSuffix: crane.com

# Ctld settings
# the listening address of control machine
CraneCtldListenAddr: 0.0.0.0
# the port of control machine to listen
CraneCtldListenPort: 10011
CraneCtldForInternalListenPort: 10013
# debug level of cranectld
CraneCtldDebugLevel: trace
# file path of cranectld log file (relative to CraneBaseDir)
CraneCtldLogFile: cranectld/cranectld.log
# file path of cranectld lock file (relative to CraneBaseDir. When using Keepalived, relative to CraneSharedBaseDir)
CraneCtldMutexFilePath: cranectld/cranectld.lock
# whether the cranectld is running in the background
CraneCtldForeground: true
CraneCtld:
  # ping timeout in seconds
  CranedTimeout: 30
  # max size of cranectld log file
  MaxLogFileSize: 50M
  # max files of cranectld log file
  MaxLogFileNum: 3

Keepalived:
  # the base directory of NFS storage
  CraneSharedBaseDir: /var/crane/
  # file path of cranectld alive file (relative to CraneBaseDir)
  CraneCtldAliveFile: cranectld/cranectld.alive

# Craned settings
# the listening address of control machine
CranedListenAddr: 0.0.0.0
# the port of control machine to listen
CranedListenPort: 10010
# debug level of craned
CranedDebugLevel: trace
# file path of craned log file (relative to CraneBaseDir)
CranedLogFile: craned/craned.log
# file path of craned lock file (relative to CraneBaseDir)
CranedMutexFilePath: craned/craned.lock
# file path of craned go module unix socket path (relative to CraneBaseDir)
CranedCforedSockPath: craned/cfored.sock
# whether the craned is running in the background
CranedForeground: true
Craned:
  # ping interval in seconds
  PingInterval: 15
  # register operation timeout in seconds
  CraneCtldTimeout: 30
  # max size of craned log file
  MaxLogFileSize: 50M
  # max files of craned log file
  MaxLogFileNum: 3
  # Set the interval for node health check.
  # 0 means the health check is disabled.
  NodeHealthCheckInterval: 0

# Scheduling settings
# Current implemented scheduling algorithms are:
# priority/basic, priority/multifactor
PriorityType: priority/multifactor

# Default value is true
PriorityFavorSmall: true

PriorityMaxAge: 14-0
PriorityWeightAge: 500
PriorityWeightFairShare: 10000

# 0 means that job size factor is not used.
PriorityWeightJobSize: 0

PriorityWeightPartition: 1000
PriorityWeightQoS: 1000000
  
EnableSlurmCompatibleEnv: false

#JobSubmitLuaScript: /path/to/your/job_submit.lua

#JobLifecycleHook:
#  Prolog: /path/to/prolog.sh
#  PrologTimeout: 60
#  PrologFlags: Contain
#  Epilog: /path/to/epilog.sh
#  EpilogTimeout: 60
#  PrologEpilogTimeout: 120
#  CranectldProlog: /path/to/cranectld_prolog.sh
#  CranectldEpilog: /path/to/cranectld_epilog.sh
#  CrunProlog: /path/to/srun_prolog.sh
#  CrunEpilog: /path/to/srun_epilog.sh
#  TaskProlog: /path/to/task_prolog.sh
#  TaskEpilog: /path/to/task_epilog.sh

# list of configuration information of the computing machine
# Nodes and partitions settings
Nodes:
  # the hostname of computing node
  - name: "cn[15-16]"
    cpu: 2
    memory: 2G

  - name: "cn[17-18]"
    cpu: 2
    memory: 2G
    gres:
      - name: gpu
        type: a100
        EnvInjector: nvidia
        # Choose ONE of DeviceFileRegex or DeviceFileList.
        # DeviceFileRegex: each expanded path is treated as one device (one slot).
        DeviceFileRegex: /dev/nvidia[0-3]
        # DeviceFileList: each YAML list item is treated as one device (one slot).
        # Comma-separated paths in the same item belong to the same device.
        # DeviceFileList:
        #   - /dev/accel0,/dev/accel0_ctl
        #   - /dev/accel1,/dev/accel1_ctl
        #   - /dev/accel2,/dev/accel2_ctl
        #   - /dev/accel3,/dev/accel3_ctl
        # DeviceCDIRegex: CDI fully-qualified names expanded via hostlist syntax.
        # DeviceCDIRegex: nvidia.com/gpu=GPU[0-3]
        # DeviceCDIList: explicit list of CDI fully-qualified names, one per device.
        # DeviceCDIList:
        #   - nvidia.com/gpu=GPU0
        #   - nvidia.com/gpu=GPU1
        #   - nvidia.com/gpu=GPU2
        #   - nvidia.com/gpu=GPU3

# partition information list
Partitions:
  - name: CPU
    # Nodes in this partition. Use "ALL" for all nodes.
    nodes: "cn[15-16]"
    priority: 5
  - name: GPU
    nodes: "cn[17-18]"
    priority: 3
    # DefaultMemPerCpu and DefaultMemPerNode are mutually exclusive.
    # If neither is set, DefaultMemPerCpu is auto-computed from partition resources.
    # Optional default memory per cpu in MB, 0 lets scheduler decide
    DefaultMemPerCpu: 0
    # Optional default memory per node in MB, 0 lets scheduler decide
    # DefaultMemPerNode: 0
    # MaxMemPerCpu and MaxMemPerNode can both be set. 0 indicates no limit.
    MaxMemPerCpu: 0
    MaxMemPerNode: 0
    # AllowedAccounts and DeniedAccounts are mutually exclusive, only one should be configured.
    # If AllowedAccounts is set, any DeniedAccounts configuration will be ignored.
    # AllowedAccounts: ac1, ac2
    # DeniedAccounts: ac1, ac2

DefaultPartition: CPU

# Advanced options:

# Maximum size of Pending Queue and must <=900000.
PendingQueueMaxSize: 900000

# Maximum size of jobs which the scheduler will attempt to schedule
# and its upper limit is 200000.
# Default value is 100000.
ScheduledBatchSize: 100000

# The set licenses and their quantities (Only need to configure in the ctld config file.)
Licenses:
  - name: fluent
    quantity: 30
  - name: ansys
    quantity: 100

AllLicenseResourcesAbsolute: false

#HealthCheck:
#  Program: /usr/sbin/nhc
#  Interval: 60
#  # IDLE, ALLOC, MIXED, ANY, NONDRAINED_IDLE, START_ONLY
#  NodeState: ANY
#  Cycle: false

# Scheduler will reject all jobs beyond processing capacity set by PendingQueueMaxSize
# if this option is set to true.
# Default value is false.
RejectJobsBeyondCapacity: false

# Set the wckey
# Default value is false.
TrackWCKey: false

# Set the mode for opening output and error files
# Default value is false.
JobFileAppend: false

# Set the flag to ignore warnings about config files mismatches.
IgnoreConfigInconsistency: false



Supervisor:
  Path: /usr/libexec/csupervisor
  # Supervisor log level
  DebugLevel: trace
  # Relate to CraneBaseDir
  LogDir: supervisor
  # max size of supervisor log file
  MaxLogFileSize: 50M
  # max files of supervisor log file
  MaxLogFileNum: 3

Container:
  # Toggle the container support in CraneSched
  Enabled: false
  # Relate to CraneBaseDir
  TempDir: supervisor/containers/
  # Runtime service endpoint, e.g., containerd socket path
  RuntimeEndpoint: /run/containerd/containerd.sock
  # In most cases, ImageEndpoint is the same as RuntimeEndpoint
  ImageEndpoint: /run/containerd/containerd.sock
  # DNS configuration for containers
  Dns:
    ClusterDomain: "cluster.local"
    Servers: ["127.0.0.1"]
    Searches: []
    Options: []
  # SubID configuration
  SubId:
    # This sample configuration enables managed mode. Adjust the mappings to
    # cover every user/group which may use userns before deploying.
    Managed: true
    UidMappings:
      - { Id: 0, IdCount: 2000, SubIdStart: 100000, SubIdSize: 65536 }
    GidMappings:
      - { Id: 0, IdCount: 2000, SubIdStart: 100000, SubIdSize: 65536 }
  # BindFS configuration
  BindFs:
    Enabled: false
    BindfsBinary: /usr/bin/bindfs
    FusermountBinary: /usr/bin/fusermount3
    MountBaseDir: /mnt/crane


Cfored:
  DebugLevel: info
  PidFilePath: cfored/cfored.pid
