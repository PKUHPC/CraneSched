}

message AddQosRequest {
  uint32 uid = 1;
  QosInfo qos = 2;
}

message AddQosReply {
  bool ok = 1;
  ErrCode code = 2;
}

message AddWckeyRequest {
  uint32 uid = 1;
  WckeyInfo wckey = 2;
}

message AddWckeyReply {
  bool ok = 1;
  ErrCode code = 2;
}

message DeleteAccountRequest {
  uint32 uid = 1;
  repeated string account_list = 2;
  bool force = 3;
}

message DeleteAccountReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message DeleteUserRequest {
  uint32 uid = 1;
  repeated string user_list = 2;
  string account = 3;
  bool force = 4;
}

message DeleteUserReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message DeleteQosRequest {
  uint32 uid = 1;
  repeated string qos_list = 2;
  bool force = 3;
}

message DeleteQosReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message DeleteWckeyRequest {
  uint32 uid = 1;
  string name = 2;
  string user_name = 3;
  bool force = 4;
}

message DeleteWckeyReply {
  bool ok = 1;
  RichError rich_error = 2;
}

message ModifyFieldOperation {
  ModifyField modify_field = 1; // modify item field
  repeated string value_list = 2; // new value
  OperationType type = 3;
}

message ModifyAccountRequest {
  uint32 uid = 1;
  string name = 2;
  repeated ModifyFieldOperation operations = 3;
  bool force = 4;
}

message ModifyAccountReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message ModifyUserRequest {
  uint32 uid = 1;
  string name = 2;
  string partition = 3;
  string account = 4;
  repeated ModifyFieldOperation operations = 5;
  bool force = 6;
}

message ModifyUserReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message ModifyQosRequest {
  uint32 uid = 1;
  string name = 2;
  repeated ModifyFieldOperation operations = 3;
}

message ModifyQosReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message ModifyDefaultWckeyRequest {
  uint32 uid = 1;
  string name = 2;
  string user_name = 3;
}

message ModifyDefaultWckeyReply {
  bool ok = 1;
  ErrCode code = 2;
}

message QueryAccountInfoRequest {
  uint32 uid = 1;
  repeated string account_list = 2;
}

message QueryAccountInfoReply {
  bool ok = 1;
  repeated AccountInfo account_list = 2;
  repeated RichError rich_error_list = 3;
}

message QueryUserInfoRequest {
  uint32 uid = 1;
  repeated string user_list = 2;
  string account = 3;
}

message QueryUserInfoReply {
  bool ok = 1;
  repeated UserInfo user_list = 2;
  repeated RichError rich_error_list = 3;
}

message QueryWckeyInfoRequest {
  uint32 uid = 1;
  repeated string wckey_list = 2;
}

message QueryWckeyInfoReply {
  bool ok = 1;
  repeated QueryWckeyInfo wckey_list = 2;
  ErrCode code = 3;
}

message QueryQosInfoRequest {
  uint32 uid = 1;
  repeated string qos_list = 2;
}

message QueryQosInfoReply {
  bool ok = 1;
  repeated QosInfo qos_list = 2;
  repeated RichError rich_error_list = 3;
}

message BlockAccountOrUserRequest {
  uint32 uid = 1;
  bool block = 2;
  EntityType entity_type = 3;
  repeated string entity_list = 4;
  string account = 5;
}

message BlockAccountOrUserReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message ModifyPartitionAclRequest {
  uint32 uid = 1;
  string partition = 2;
  bool is_allowed_list = 3;
  repeated string accounts = 4;
}

message ModifyPartitionAclReply {
  bool ok = 1;
  ErrCode code = 2;
}

message MigrateSshProcToCgroupRequest {
  int32 pid = 1;
  uint32 job_id = 2;
}

message MigrateSshProcToCgroupReply {
  bool ok = 1;
}

message QuerySshStepEnvVariablesRequest {
  uint32 job_id = 1;
}

message QuerySshStepEnvVariablesReply {
  bool ok = 1;
  map<string /*name*/, string /*value*/> env_map = 2;
}

message QuerySshStepEnvVariablesForwardRequest {
  uint32 job_id = 1;
  string execution_node = 2 [deprecated = true];
}

message QuerySshStepEnvVariablesForwardReply {
  bool ok = 1;
  map<string /*name*/, string /*value*/> env_map = 2;
}

message QueryClusterInfoRequest {
  repeated string filter_partitions = 1;
  repeated string filter_nodes = 2;
  repeated CranedResourceState filter_craned_resource_states = 3;
  repeated CranedControlState filter_craned_control_states = 4;
  repeated CranedPowerState filter_craned_power_states = 5;
}

message QueryClusterInfoReply {
  bool ok = 1;
  repeated TrimmedPartitionInfo partitions = 2;
}

message QueryJobsInfoRequest {
  map<uint32 /*JobId*/, JobStepIds> filter_ids = 1;
  repeated string filter_partitions = 2;
  uint32 num_limit = 3;
  repeated string filter_job_names = 4;
  repeated string filter_qos = 5;

  repeated JobStatus filter_states = 6;
  repeated string filter_users = 7;
  repeated string filter_accounts = 8;
  TimeInterval filter_submit_time_interval = 9;
  TimeInterval filter_start_time_interval = 10;
  TimeInterval filter_end_time_interval = 11;
  repeated JobType filter_job_types = 12;
  repeated string filter_licenses = 13;
  repeated string filter_nodename_list = 14;

  bool option_include_completed_jobs = 15;
}

message QueryJobsInfoReply {
  bool ok = 1;
  repeated JobInfo job_info_list = 2;
}

message QueryJobEfficiencyRequest {
  repeated uint32 job_ids = 1;
  uint32 uid = 2; // User ID for authorization
}

message JobEfficiencyInfo {
  uint32 job_id = 1;
  string hostname = 2;
  uint64 cpu_usage = 3; // CPU usage in nanoseconds
  uint64 memory_usage = 4; // Memory usage in bytes
  uint64 proc_count = 5; // Process count
  google.protobuf.Timestamp timestamp = 6;
}

message QueryJobEfficiencyReply {
  bool ok = 1;
  string error_message = 2;
  repeated JobEfficiencyInfo efficiency_data = 3;
}

message QueryNodeEventsRequest {
  repeated string node_names = 1; // Node names to query, empty means all nodes
  uint32 uid = 2; // User ID for authorization
}

message NodeEventInfo {
  string cluster_name = 1;
  string node_name = 2;
  uint64 uid = 3;
  int64 start_time = 4; // Unix timestamp in nanoseconds
  int64 end_time = 5; // Unix timestamp in nanoseconds
  string state = 6;
  string reason = 7;
}

message QueryNodeEventsReply {
  bool ok = 1;
  string error_message = 2;
  repeated NodeEventInfo event_info_list = 3;
}

message CreateReservationRequest {
  uint32 uid = 1;
  string reservation_name = 2;
  int64 start_time_unix_seconds = 3;
  int64 duration_seconds = 4;
  string partition = 5;
  string craned_regex = 6;

  repeated string allowed_accounts = 7;
  repeated string denied_accounts = 8;
  repeated string allowed_users = 9;
  repeated string denied_users = 10;

  uint32 node_num = 11;
}

message CreateReservationReply {
  bool ok = 1;
  string reason = 2;
}

message DeleteReservationRequest {
  uint32 uid = 1;
  string reservation_name = 2;
  bool force = 3;
}

message DeleteReservationReply {
  bool ok = 1;
  string reason = 2;
}

message ResetPartitionAclRequest {
  uint32 uid = 1;
  bool reload_from_config = 2; // true: reload defaults from config, false: clear all
}

message ResetPartitionAclReply {
  bool ok = 1;
}

message StreamCallocRequest {
  enum CallocRequestType {
    JOB_REQUEST = 0;
    JOB_COMPLETION_REQUEST = 1;
  }

  message JobReq {
    int32 calloc_pid = 1;
    JobToCtld job = 2;
  }

  message JobCompleteReq {
    uint32 job_id = 1;
    uint32 step_id = 2;
    JobStatus status = 3;
  }

  CallocRequestType type = 1;

  oneof payload {
    JobReq payload_job_req = 2;
    JobCompleteReq payload_job_complete_req = 3;
  }
}

message StreamCallocReply {
  enum CforedReplyType {
    JOB_ID_REPLY = 0;
    JOB_RES_ALLOC_REPLY = 1;
    JOB_CANCEL_REQUEST = 2;
    JOB_COMPLETION_ACK_REPLY = 3;
  }

  message JobIdReply {
    bool ok = 1;
    uint32 job_id = 2;
    uint32 step_id = 3;
    string failure_reason = 4;
  }

  message JobResAllocatedReply {
    bool ok = 1;
    string allocated_craned_regex = 2;
  }

  message JobCancelRequest {}

  message JobCompletionAckReply {
    bool ok = 1;
  }

  CforedReplyType type = 1;

  oneof payload {
    JobIdReply payload_job_id_reply = 2;
    JobResAllocatedReply payload_job_alloc_reply = 3;
    JobCancelRequest payload_job_cancel_request = 4;
    JobCompletionAckReply payload_job_completion_ack_reply = 5;
  }
}

message StreamCforedRequest {
  enum CforedRequestType {
    CFORED_REGISTRATION = 0;
    JOB_REQUEST = 1;
    STEP_REQUEST = 4;
    JOB_COMPLETION_REQUEST = 2;
    CFORED_GRACEFUL_EXIT = 3;
    STEP_META_REQUEST = 5;
  }
  CforedRequestType type = 1;

  message CforedReg {
    string cfored_name = 1;
  }

  message JobReq {
    string cfored_name = 1;
    int32 pid = 2;
    JobToCtld job = 3;
  }

  message StepReq {
    string cfored_name = 1;
    int32 pid = 2;
    StepToCtld step = 3;
  }

  message JobCompleteReq {
    string cfored_name = 1;
    uint32 job_id = 2;
    uint32 step_id = 3;
    JobStatus status = 4;
    InteractiveJobType interactive_type = 5;
  }

  message GracefulExitReq {
    string cfored_name = 1;
  }

  message StepMetaReq {
    uint32 uid = 1;
    uint32 job_id = 2;
    uint32 step_id = 4;
    int32 cattach_pid = 3;
  }

  oneof payload {
    CforedReg payload_cfored_reg = 2;
    JobReq payload_job_req = 3;
    StepReq payload_step_req = 6;
    JobCompleteReq payload_job_complete_req = 4;
    GracefulExitReq payload_graceful_exit_req = 5;
    StepMetaReq payload_step_meta_req = 7;
  }
}

message StreamCtldReply {
  enum CtldReplyType {
    JOB_ID_REPLY = 0;
    JOB_RES_ALLOC_REPLY = 1;
    JOB_CANCEL_REQUEST = 2;
    JOB_COMPLETION_ACK_REPLY = 3;
    CFORED_REGISTRATION_ACK = 4;
    CFORED_GRACEFUL_EXIT_ACK = 5;
    STEP_META_REPLY = 6;
  }

  message JobIdReply {
    int32 pid = 1;
    bool ok = 2;
    uint32 job_id = 3;
    uint32 step_id = 4;
    string failure_reason = 5;
  }

  message JobResAllocatedReply {
    uint32 job_id = 1;
    uint32 step_id = 2;
    bool ok = 3;
    string allocated_craned_regex = 4;
    string failure_reason = 5;
    repeated string craned_ids = 6;
    message Tasks {
      repeated uint32 task_ids = 1;
    }
    map<string, Tasks> craned_task_map = 7;
    uint32 ntasks_total = 8;
  }

  message JobCancelRequest {
    uint32 job_id = 1;
    uint32 step_id = 2;
  }

  message JobCompletionAckReply {
    uint32 job_id = 1;
    uint32 step_id = 2;
  }

  message CforedRegistrationAck {
    bool ok = 1;
    string failure_reason = 2;
  }

  message CforedGracefulExitAck {
    bool ok = 1;
  }

  message StepMetaReply {
    bool ok = 1;
    string failure_reason = 2;
    StepToCtld step = 3;
    int32 cattach_pid = 4;
  }

  CtldReplyType type = 1;

  oneof payload {
    CforedRegistrationAck payload_cfored_reg_ack = 2;
    JobResAllocatedReply payload_job_res_alloc_reply = 3;
    JobCancelRequest payload_job_cancel_request = 4;
    JobCompletionAckReply payload_job_completion_ack = 5;
    JobIdReply payload_job_id_reply = 6;
    CforedGracefulExitAck payload_graceful_exit_ack = 7;
    StepMetaReply payload_step_meta_reply = 8;
  }
}

message StreamCrunRequest {
  enum CrunRequestType {
    JOB_REQUEST = 0;
    STEP_REQUEST = 4;
    STEP_COMPLETION_REQUEST = 1;
    TASK_IO_FORWARD = 2;
    STEP_X11_FORWARD = 3;
  }

  message JobReq {
    int32 crun_pid = 1;
    JobToCtld job = 2;
  }

  message StepReq {
    int32 crun_pid = 1;
    StepToCtld step = 2;
  }

  message StepCompleteReq {
    JobStatus status = 1;
  }

  message TaskIOForwardReq {
    bytes msg = 1;
    bool eof = 2;
    optional uint32 task_id = 3;
  }

  message StepX11ForwardReq {
    bytes msg = 1;
    bool eof = 2;
    uint32 local_id = 3;
    string craned_id = 4;
  }

  CrunRequestType type = 1;

  oneof payload {
    JobReq payload_job_req = 2;
    StepReq payload_step_req = 6;
    StepCompleteReq payload_step_complete_req = 3;
    TaskIOForwardReq payload_task_io_forward_req = 4;
    StepX11ForwardReq payload_step_x11_forward_req = 5;
  }
}

message StreamCrunReply {
  enum CforedCrunReplyType {
    STEP_ID_REPLY = 0;
    STEP_RES_ALLOC_REPLY = 1;
    STEP_CANCEL_REQUEST = 2;
    STEP_COMPLETION_ACK_REPLY = 3;
    TASK_IO_FORWARD = 4;
    TASK_IO_FORWARD_READY = 5;
    STEP_X11_FORWARD = 6;
    TASK_EXIT_STATUS = 7;
    STEP_X11_CONN = 8;
    STEP_X11_EOF = 9;
    TASK_ERR_OUTPUT_FORWARD = 10;
  }

  message StepIdReply {
    bool ok = 1;
    uint32 job_id = 2;
    uint32 step_id = 3;
    string failure_reason = 4;
  }

  message StepResAllocatedReply {
    bool ok = 1;
    string allocated_craned_regex = 2;
    repeated string craned_ids = 3;
    message Tasks {
      repeated uint32 task_ids = 1;
    }
    map<string, Tasks> craned_task_map = 4;
    uint32 ntasks_total = 5;
  }

  message StepCancelRequest {}

  message StepCompletionAckReply {
    bool ok = 1;
  }

  message TaskIOForwardReadyReply {
    bool ok = 1;
  }

  message TaskIOForwardReply {
    bytes msg = 1;
  }

  message TaskIOErrOutputForwardReply {
    bytes msg = 1;
  }

  message StepX11ConnReply {
    string craned_id = 1;
    uint32 local_id = 2;
  }

  message StepX11ForwardReply {
    bytes msg = 1;
    string craned_id = 2;
    uint32 local_id = 3;
  }

  message StepX11EofReply {
    string craned_id = 1;
    uint32 local_id = 2;
  }

  message TaskExitStatusReply {
    uint32 task_id = 1;
    uint32 exit_code = 2;
    bool signaled = 3;
  }

  CforedCrunReplyType type = 1;

  oneof payload {
    StepIdReply payload_step_id_reply = 2;
    StepResAllocatedReply payload_step_alloc_reply = 3;
    StepCancelRequest payload_step_cancel_request = 4;
    StepCompletionAckReply payload_step_completion_ack_reply = 5;
    TaskIOForwardReadyReply payload_task_io_forward_ready_reply = 6;
    TaskIOForwardReply payload_task_io_forward_reply = 7;
    StepX11ForwardReply payload_step_x11_forward_reply = 8;
    TaskExitStatusReply payload_task_exit_status_reply = 9;
    StepX11ConnReply payload_step_x11_conn_reply = 10;
    StepX11EofReply payload_step_x11_eof_reply = 11;
    TaskIOErrOutputForwardReply payload_task_io_err_output_forward_reply = 12;
  }
}

message StreamStepIORequest {
  enum SupervisorRequestType {
    SUPERVISOR_REGISTER = 0;
    TASK_OUTPUT = 1;
    SUPERVISOR_UNREGISTER = 2;
    STEP_X11_OUTPUT = 3;
    TASK_EXIT_STATUS = 4;
    STEP_X11_CONN = 5;
    STEP_X11_EOF = 6;
    TASK_ERR_OUTPUT = 7;
  }

  message SupervisorRegisterReq {
    string craned_id = 1;
    uint32 job_id = 2;
    uint32 step_id = 3;
  }

  message TaskOutputReq {
    bytes  msg     = 1;
    uint32 task_id = 2; // The rank/id of the task that produced this output.
  }

  message TaskErrOutputReq {
    bytes msg = 1;
  }

  message SupervisorUnRegisterReq {}

  message StepX11FwdConnReq {
    uint32 local_id = 1;
    string craned_id = 2;
  }

  message StepX11OutputReq {
    bytes msg = 1;
    uint32 local_id = 2;
    string craned_id = 3;
  }

  message StepX11OutputEofReq {
    uint32 local_id = 1;
    string craned_id = 2;
  }

  message TaskExitStatus {
    uint32 task_id = 1;
    uint32 exit_code = 2;
    bool signaled = 3;
  }

  SupervisorRequestType type = 1;

  oneof payload {
    SupervisorRegisterReq payload_register_req = 2;
    TaskOutputReq payload_task_output_req = 3;
    SupervisorUnRegisterReq payload_unregister_req = 4;
    StepX11OutputReq payload_step_x11_output_req = 5;
    TaskExitStatus payload_task_exit_status_req = 6;
    StepX11FwdConnReq payload_step_x11_fwd_conn_req = 7;
    StepX11OutputEofReq payload_step_x11_eof_req = 8;
    TaskErrOutputReq payload_task_err_output_req = 9;
  }
}

message StreamStepIOReply {
  enum SupervisorReplyType {
    SUPERVISOR_REGISTER_REPLY = 0;
    TASK_INPUT = 1;
    SUPERVISOR_UNREGISTER_REPLY = 2;
    STEP_X11_INPUT = 3;
  }

  message SupervisorRegisterReply {
    bool ok = 1;
  }

  message TaskInputReq {
    bytes           msg     = 1;
    bool            eof     = 2;
    optional uint32 task_id = 3;  // If set, deliver stdin only to the specified task; otherwise broadcast.
  }

  message SupervisorUnregisterReply {
    bool ok = 1;
  }

  message StepX11InputReq {
    bytes msg = 1;
    bool eof = 2;
    uint32 local_id = 3;
  }

  SupervisorReplyType type = 1;

  oneof payload {
    SupervisorRegisterReply payload_supervisor_register_reply = 2;
    TaskInputReq payload_task_input_req = 3;
    SupervisorUnregisterReply payload_supervisor_unregister_reply = 4;
    StepX11InputReq payload_step_x11_input_req = 5;
  }
}

message PowerStateChangeRequest {
  string craned_id = 1;
  CranedPowerState state = 2;
  string reason = 3;
}

message PowerStateChangeReply {
  bool ok = 1;
}

message EnableAutoPowerControlRequest {
  uint32 uid = 1;
  repeated string craned_ids = 2;
  bool enable = 3;
}

message EnableAutoPowerControlReply {
  repeated string modified_nodes = 1;
  repeated string not_modified_nodes = 2;
  repeated string not_modified_reasons = 3;
}

message SignUserCertificateRequest {
  uint32 uid = 1;
  string csr_content = 2;
  string alt_names = 3; // "localhost, *.domainSuffix"
}

message SignUserCertificateResponse {
  bool ok = 1;
  string certificate = 2;
  ErrCode reason = 3;
}

message ResetUserCredentialRequest {
  uint32 uid = 1;
  repeated string user_list = 2;
}

message ResetUserCredentialReply {
  bool ok = 1;
  repeated RichError rich_error_list = 2;
}

message QueryTxnLogRequest {
  uint32 uid = 1;
  string actor = 2;
  string target = 3;
  string action = 4;
  string info = 5;
  TimeInterval time_interval = 6;
}

message QueryTxnLogReply {
  bool ok = 1;
  ErrCode code = 2;
  message Txn {
    string actor = 1;
    string target = 2;
    TxnAction action = 3;
    string info = 4;
    int64 creation_time = 5;
  }
  repeated Txn txn_log_list = 3;
}

message AttachContainerStepRequest {
  uint32 uid = 1;
  uint32 job_id = 2;
  uint32 step_id = 3;
  string node_name = 4;

  bool stdin = 6;
  bool tty = 7;
  bool stdout = 8;
  bool stderr = 9;
}

message AttachContainerStepReply {
  bool ok = 1;
  RichError status = 2;
  string url = 3;
}

message ExecInContainerStepRequest {
  uint32 uid = 1;
  uint32 job_id = 2;
  uint32 step_id = 3;
  string node_name = 4;

  repeated string command = 5;

  bool stdin = 6;
  bool tty = 7;
  bool stdout = 8;
  bool stderr = 9;
}

message ExecInContainerStepReply {
  bool ok = 1;
  RichError status = 2;
  string url = 3;
}

message AddOrModifyLicenseResourceRequest {
  uint32 uid = 1;
  string resource_name = 2;
  string server = 3;
  repeated string clusters = 4;
  message Operator {
    LicenseResource.Field operator_field = 1;
    string value = 2;
  }
  repeated Operator operators = 5;
  bool is_add = 6;
}

message AddOrModifyLicenseResourceReply {
  bool ok = 1;
  RichError rich_err = 2;
}

message DeleteLicenseResourceRequest {
  uint32 uid = 1;
  string resource_name = 2;
  string server = 3;
  repeated string clusters = 4;
  bool force = 5;
}

message DeleteLicenseResourceReply {
  bool ok = 1;
  RichError rich_err = 2;
}

message QueryLicenseResourceRequest {
  uint32 uid = 1;
  string resource_name = 2;
  string server = 3;
  repeated string clusters = 4;
}

message QueryLicenseResourceReply {
  bool ok = 1;
  RichError rich_err = 2;
  repeated LicenseResourceInfo license_resource_list = 3;
}

message UpdateNodeDrainStateRequest {
  string craned_id = 1;
  bool drain = 2;
  string reason = 3;
}

message UpdateNodeDrainStateReply {
  bool ok = 1;
}

message QueryJobSummaryRequest {
  enum JobSummaryReportType {
    ACCOUNT_UTILIZATION_BY_USER = 0;
    ACCOUNT_UTILIZATION_BY_QOS = 1;
    USER_UTILIZATION_BY_ACCOUNT = 2;
    USER_UTILIZATION_BY_WCKEY = 3;
    WCKEY_UTILIZATION_BY_USER = 4;
    USER_TOP_USAGE = 5;
  }
  repeated string filter_accounts = 1;
  repeated string filter_users = 2;
  repeated string filter_qoss = 3;
  repeated string filter_wckeys = 4;
  google.protobuf.Timestamp filter_start_time = 5;
  google.protobuf.Timestamp filter_end_time = 6;
  repeated uint32 filter_gids = 7;
  uint32 num_limit = 8;
  JobSummaryReportType report_type = 9;
}

message QueryJobSummaryReply {
  repeated JobSummaryItem item_list = 1;
}

message QueryJobSizeSummaryRequest {
  repeated string filter_accounts = 1;
  repeated string filter_users = 2;
  repeated string filter_qoss = 3;
  repeated string filter_wckeys = 4;
  repeated string filter_partitions = 5;
  repeated string filter_nodename_list = 6;
  google.protobuf.Timestamp filter_start_time = 7;
  google.protobuf.Timestamp filter_end_time = 8;
  repeated uint32 filter_grouping_list = 9;
  repeated uint32 filter_job_ids = 10;
  repeated uint32 filter_gids = 11;
}

message QueryJobSizeSummaryReply {
  repeated JobSizeSummaryItem item_list = 1;
}

// Todo: Divide service into two parts: one for Craned and one for Crun
//  We need to distinguish the message sender
//  and have some kind of authentication
service CraneCtld {
  /* RPCs called from ccancel */
  rpc CancelJob(CancelJobRequest) returns (CancelJobReply);

  /* RPCs called from cbatch */
  rpc SubmitBatchJob(SubmitBatchJobRequest) returns (SubmitBatchJobReply);
  rpc SubmitBatchJobs(SubmitBatchJobsRequest) returns (SubmitBatchJobsReply);
  rpc SubmitContainerStep(SubmitContainerStepRequest) returns (SubmitContainerStepReply);

  /* PRCs called from ccontrol */
  rpc QueryCranedInfo(QueryCranedInfoRequest) returns (QueryCranedInfoReply);
  rpc QueryPartitionInfo(QueryPartitionInfoRequest) returns (QueryPartitionInfoReply);
  rpc QueryReservationInfo(QueryReservationInfoRequest) returns (QueryReservationInfoReply);
  rpc QueryLicensesInfo(QueryLicensesInfoRequest) returns (QueryLicensesInfoReply);
  rpc ModifyJob(ModifyJobRequest) returns (ModifyJobReply);
  rpc ModifyNode(ModifyCranedStateRequest) returns (ModifyCranedStateReply);
  rpc ModifyPartitionAcl(ModifyPartitionAclRequest) returns (ModifyPartitionAclReply);
  rpc EnableAutoPowerControl(EnableAutoPowerControlRequest) returns (EnableAutoPowerControlReply);
  rpc ModifyJobsExtraAttrs(ModifyJobsExtraAttrsRequest) returns (ModifyJobsExtraAttrsReply);
  rpc ResetNextJobId(ResetNextJobIdRequest) returns (ResetNextJobIdReply);
  rpc ResetNextStepDbId(ResetNextStepDbIdRequest) returns (ResetNextStepDbIdReply);
  rpc PurgeJobHistory(PurgeJobHistoryRequest) returns (PurgeJobHistoryReply);

  /* RPCs called from cacctmgr */
  rpc AddAccount(AddAccountRequest) returns (AddAccountReply);
  rpc AddUser(AddUserRequest) returns (AddUserReply);
  rpc AddQos(AddQosRequest) returns (AddQosReply);
  rpc AddWckey(AddWckeyRequest) returns (AddWckeyReply);

  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountReply);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserReply);
  rpc DeleteQos(DeleteQosRequest) returns (DeleteQosReply);
  rpc DeleteWckey(DeleteWckeyRequest) returns (DeleteWckeyReply);

  rpc QueryAccountInfo(QueryAccountInfoRequest) returns (QueryAccountInfoReply);
  rpc QueryUserInfo(QueryUserInfoRequest) returns (QueryUserInfoReply);
  rpc QueryQosInfo(QueryQosInfoRequest) returns (QueryQosInfoReply);
  rpc QueryWckeyInfo(QueryWckeyInfoRequest) returns (QueryWckeyInfoReply);

  rpc ModifyAccount(ModifyAccountRequest) returns (ModifyAccountReply);
  rpc ModifyUser(ModifyUserRequest) returns (ModifyUserReply);
  rpc ModifyQos(ModifyQosRequest) returns (ModifyQosReply);
  rpc ModifyDefaultWckey(ModifyDefaultWckeyRequest) returns (ModifyDefaultWckeyReply);

  rpc BlockAccountOrUser(BlockAccountOrUserRequest) returns (BlockAccountOrUserReply);

  rpc ResetUserCredential(ResetUserCredentialRequest) returns (ResetUserCredentialReply);

  rpc QueryTxnLog(QueryTxnLogRequest) returns (QueryTxnLogReply);

  rpc DeleteLicenseResource(DeleteLicenseResourceRequest) returns (DeleteLicenseResourceReply);
  rpc AddOrModifyLicenseResource(AddOrModifyLicenseResourceRequest) returns (AddOrModifyLicenseResourceReply);
  rpc QueryLicenseResource(QueryLicenseResourceRequest) returns (QueryLicenseResourceReply);

  /* RPCs called from cinfo */
  rpc QueryClusterInfo(QueryClusterInfoRequest) returns (QueryClusterInfoReply);

  /* common RPCs */
  rpc QueryJobsInfo(QueryJobsInfoRequest) returns (QueryJobsInfoReply);
  rpc CreateReservation(CreateReservationRequest) returns (CreateReservationReply);
  rpc DeleteReservation(DeleteReservationRequest) returns (DeleteReservationReply);
  rpc ResetPartitionAcl(ResetPartitionAclRequest) returns (ResetPartitionAclReply);

  rpc QueryJobSummary(QueryJobSummaryRequest) returns (stream QueryJobSummaryReply);
  rpc QueryJobSizeSummary(QueryJobSizeSummaryRequest) returns (stream QueryJobSizeSummaryReply);

  /* RPC called form plugin */
  rpc PowerStateChange(PowerStateChangeRequest) returns (PowerStateChangeReply);

  /* RPCS called from PKI request */
  rpc SignUserCertificate(SignUserCertificateRequest) returns (SignUserCertificateResponse);

  /* RPCS called from ccon */
  rpc AttachContainerStep(AttachContainerStepRequest) returns (AttachContainerStepReply);
  rpc ExecInContainerStep(ExecInContainerStepRequest) returns (ExecInContainerStepReply);
}

service PluginQueryService {
  rpc QueryJobEfficiency(QueryJobEfficiencyRequest) returns (QueryJobEfficiencyReply);
  rpc QueryNodeEvents(QueryNodeEventsRequest) returns (QueryNodeEventsReply);
}

service CraneCtldForInternal {
  /* RPCs called from Craned */
  rpc StepStatusChange(StepStatusChangeRequest) returns (StepStatusChangeReply);
  rpc CranedTriggerReverseConn(CranedTriggerReverseConnRequest) returns (google.protobuf.Empty);
  rpc CranedRegister(CranedRegisterRequest) returns (CranedRegisterReply);
  rpc CranedPing(CranedPingRequest) returns (CranedPingReply);

  rpc UpdateNodeDrainState(UpdateNodeDrainStateRequest) returns (UpdateNodeDrainStateReply);
  rpc QueryCranedInfo(QueryCranedInfoRequest) returns (QueryCranedInfoReply);

  /* RPCs called from Cfored */
  rpc CforedStream(stream StreamCforedRequest) returns (stream StreamCtldReply);
}

service Craned {
  /* ----------------------------------- Called from CraneCtld ---------------------------------------------------- */
  rpc Configure(ConfigureCranedRequest) returns (google.protobuf.Empty);
  rpc ExecuteSteps(ExecuteStepsRequest) returns (ExecuteStepsReply);

  rpc AllocJobs(AllocJobsRequest) returns (AllocJobsReply);
  rpc AllocSteps(AllocStepsRequest) returns (AllocStepsReply);
  rpc FreeSteps(FreeStepsRequest) returns (FreeStepsReply);
  rpc FreeJobs(FreeJobsRequest) returns (FreeJobsReply);
  /*
  If the job is an interactive job, the resource uuid is also revoked.
   If there's no process in this interactive job, just deallocate all the resources.
   If there are processes in this interactive job, kill all the processes and deallocate resources.
  If the job is a batch job, just kill it.
  */
  rpc TerminateSteps(TerminateStepsRequest) returns (TerminateStepsReply);
  rpc SuspendJobs(SuspendJobsRequest) returns (SuspendJobsReply);
  rpc ResumeJobs(ResumeJobsRequest) returns (ResumeJobsReply);
  rpc TerminateOrphanedStep(TerminateOrphanedStepRequest) returns (TerminateOrphanedStepReply);
  rpc ChangeJobTimeConstraint(ChangeJobTimeConstraintRequest) returns (ChangeJobTimeConstraintReply);

  /*
  Craned will proxy the following container-related RPCs to CRI Service.
  */
  rpc AttachContainerStep(AttachContainerStepRequest) returns (AttachContainerStepReply);
  rpc ExecInContainerStep(ExecInContainerStepRequest) returns (ExecInContainerStepReply);

  /* ----------------------------------- Called from Craned  ------------------------------------------------------ */
  rpc QueryStepFromPort(QueryStepFromPortRequest) returns (QueryStepFromPortReply);
  rpc QuerySshStepEnvVariables(QuerySshStepEnvVariablesRequest) returns (QuerySshStepEnvVariablesReply);
  /* ----------------------------------- Called from Supervisor  --------------------------------------------------- */
  rpc StepStatusChange(StepStatusChangeRequest) returns (StepStatusChangeReply);
}

service CranedForPam {
  /* ----------------------------------- Called from Pam Module  --------------------------------------------------- */
  rpc QueryStepFromPortForward(QueryStepFromPortForwardRequest) returns (QueryStepFromPortForwardReply);
  rpc MigrateSshProcToCgroup(MigrateSshProcToCgroupRequest) returns (MigrateSshProcToCgroupReply);
  rpc QuerySshStepEnvVariablesForward(QuerySshStepEnvVariablesForwardRequest)
      returns (QuerySshStepEnvVariablesForwardReply);
}

service CraneForeD {
  rpc CallocStream(stream StreamCallocRequest) returns (stream StreamCallocReply);
  rpc CrunStream(stream StreamCrunRequest) returns (stream StreamCrunReply);
  rpc StepIOStream(stream StreamStepIORequest) returns (stream StreamStepIOReply);
  rpc QueryStepFromPort(QueryStepFromPortRequest) returns (QueryStepFromPortReply);
}
