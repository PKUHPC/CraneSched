syntax = "proto3";

package crane.grpc;
option go_package = "CraneFrontEnd/generated/protos";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "PublicDefs.proto";

message StepStatusChangeRequest {
  uint32 job_id = 1;
  uint32 step_id = 2;
  string craned_id = 3;
  JobStatus new_status = 4;
  uint32 exit_code = 5;
  string reason = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message StepStatusChangeReply {
  bool ok = 1;
}

message CranedTriggerReverseConnRequest {
  string craned_id = 1;
  google.protobuf.Timestamp token = 2;
}

message ConfigureCranedRequest {
  bool ok = 1;
  map<uint32, JobStepsToD> job_steps = 2;
  google.protobuf.Timestamp token = 3;
}

message CranedRegisterRequest {
  string craned_id = 1;
  CranedRemoteMeta remote_meta = 2;
  google.protobuf.Timestamp token = 3;
}

message CranedRegisterReply {
  bool ok = 1;
}

message CranedPingRequest {
  string craned_id = 1;
}

message CranedPingReply {
  bool ok = 1;
}

message QueryCranedListFromJobIdRequest {
  uint32 job_id = 1;
}

message QueryCranedListFromJobIdReply {
  bool ok = 1;
  string craned_list = 2;
}

message SubmitBatchJobRequest {
  JobToCtld job = 1;
}

message SubmitBatchJobReply {
  bool ok = 1;
  oneof payload {
    uint32 job_id = 2;
    ErrCode code = 3;
  }
  string reason = 4;
}

message SubmitBatchJobsRequest {
  JobToCtld job = 1;
  uint32 count = 2;
}

message SubmitBatchJobsReply {
  repeated uint32 job_id_list = 1;
  repeated ErrCode code_list = 2;
}

message SubmitContainerStepRequest {
  StepToCtld step = 1;
}

message SubmitContainerStepReply {
  bool ok = 1;
  uint32 job_id = 2;
  oneof payload {
    uint32 step_id = 3;
    ErrCode code = 4;
  }
}

message AllocJobsRequest {
  repeated JobToD jobs = 1;
}

message AllocJobsReply {}

message AllocStepsRequest {
  repeated StepToD steps = 1;
}

message AllocStepsReply {}

message FreeStepsRequest {
  map<uint32, JobStepIds> job_step_ids_map = 1;
}

message FreeStepsReply {}

message FreeJobsRequest {
  repeated uint32 job_id_list = 1;
}

message FreeJobsReply {}

message ExecuteStepsRequest {
  map<uint32, JobStepIds> job_step_ids_map = 1;
}

message ExecuteStepsReply {
  map<uint32, JobStepIds> failed_job_step_ids_map = 1;
}

message TerminateStepsRequest {
  map<uint32, JobStepIds> job_step_ids_map = 1;
  TerminateSource terminate_source = 2;
}

message TerminateStepsReply {
  bool ok = 1;
  string reason = 2;
}

message SuspendJobsRequest {
  // Suspend operations are applied on job granularity.
  repeated uint32 job_id_list = 1;
}

message SuspendJobsReply {
  bool ok = 1;
  string reason = 2;
}

message ResumeJobsRequest {
  // Resume operations are applied on job granularity.
  repeated uint32 job_id_list = 1;
}

message ResumeJobsReply {
  bool ok = 1;
  string reason = 2;
}

message TerminateOrphanedStepRequest {
  map<uint32, JobStepIds> job_step_ids_map = 1;
}

message TerminateOrphanedStepReply {
  bool ok = 1;
  string reason = 2;
}

message ChangeJobTimeConstraintRequest {
  uint32 job_id = 1;
  optional int64 time_limit_seconds = 2;
  optional int64 deadline_time = 3;
}

message ChangeJobTimeConstraintReply {
  bool ok = 1;
}

message CancelJobRequest {
  uint32 operator_uid = 1;

  // Filters
  map<uint32, JobStepIds> filter_ids = 2;
  string filter_partition = 3;
  string filter_account = 4;
  JobStatus filter_state = 5;
  string filter_job_name = 6;
  repeated string filter_nodes = 7;
  string filter_username = 8;
}

message CancelJobReply {
  map<uint32, JobStepIds> cancelled_steps = 1;
  message NotCancelledJobSteps {
    string reason = 1;
    repeated uint32 step_ids = 2;
    repeated string step_reasons = 3;
  }
  map<uint32, NotCancelledJobSteps> not_cancelled_job_steps = 2;
}

message QueryStepFromPortRequest {
  uint32 port = 1;
}

message QueryStepFromPortReply {
  bool ok = 1;
  uint32 job_id = 2;
}

message QueryStepFromPortForwardRequest {
  uint32 ssh_remote_port = 1;
  string ssh_remote_address = 2;
  uint32 uid = 3;
}

message QueryStepFromPortForwardReply {
  bool ok = 1;
  bool from_user = 2;
  uint32 job_id = 3;
  string cgroup_path = 4;
}

message QueryCranedInfoRequest {
  string craned_name = 1;
}

message QueryCranedInfoReply {
  repeated CranedInfo craned_info_list = 1;
}

message QueryPartitionInfoRequest {
  string partition_name = 1;
}

message QueryPartitionInfoReply {
  repeated PartitionInfo partition_info_list = 1;
}

message QueryReservationInfoRequest {
  uint32 uid = 1;
  string reservation_name = 2;
}

message QueryReservationInfoReply {
  bool ok = 1;
  string reason = 2;
  repeated ReservationInfo reservation_info_list = 3;
}

message QueryLicensesInfoRequest {
  repeated string license_name_list = 1;
}

message QueryLicensesInfoReply {
  bool ok = 1;
  repeated LicenseInfo license_info_list = 2;
}

message ModifyJobRequest {
  enum TargetAttributes {
    TimeLimit = 0;
    Priority = 1;
    Hold = 2;
    Deadline = 3;
    Suspend = 4;
    Resume = 5;
  }

  uint32 uid = 1;
  repeated uint32 job_ids = 2;

  TargetAttributes attribute = 3;

  oneof value {
    int64 time_limit_seconds = 4;
    double mandated_priority = 5;

    // If hold_seconds == 0, release the hold constraint timer if any exists;
    // If hold_seconds > 0, add or overwrite a hold constraint timer;
    // If hold_seconds == MaxInt64, add a hold constraint without timer.
    int64 hold_seconds = 7;
    google.protobuf.Timestamp deadline_time = 8;
  }
}

message ModifyJobReply {
  repeated uint32 modified_jobs = 2;
  repeated uint32 not_modified_jobs = 3;
  repeated string not_modified_reasons = 4;
}

message ModifyJobsExtraAttrsRequest {
  uint32 uid = 1;
  map<uint32 /*job_id*/, string /*extraAttrs*/> extra_attrs_list = 2;
}

message ModifyJobsExtraAttrsReply {
  repeated uint32 modified_jobs = 1;
  repeated uint32 not_modified_jobs = 2;
  repeated string not_modified_reasons = 3;
}

message ResetNextJobIdRequest {
  uint32 uid = 1;
  uint32 next_job_id = 2; // Reset to this value (0 = default to 1)
  int64 next_job_db_id = 3; // Reset to this value (0 = default to 1)
}

message ResetNextJobIdReply {
  bool ok = 1;
  string reason = 2;
}

message ResetNextStepDbIdRequest {
  uint32 uid = 1;
}

message ResetNextStepDbIdReply {
  bool ok = 1;
  string reason = 2;
}

message PurgeJobHistoryRequest {
  uint32 uid = 1;
}

message PurgeJobHistoryReply {
  bool ok = 1;
  string reason = 2;
}

message ModifyCranedStateRequest {
  uint32 uid = 1;
  repeated string craned_ids = 2;
  CranedControlState new_state = 3;
  string reason = 4;
}

message ModifyCranedStateReply {
  repeated string modified_nodes = 2;
  repeated string not_modified_nodes = 3;
  repeated string not_modified_reasons = 4;
}

message AddAccountRequest {
  uint32 uid = 1;
  AccountInfo account = 2;
}

message AddAccountReply {
  bool ok = 1;
  ErrCode code = 2;
}

message AddUserRequest {
  uint32 uid = 1;
  UserInfo user = 2;
}

message AddUserReply {
  bool ok = 1;
