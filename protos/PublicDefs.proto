enum EntityType {
  Account = 0;
  User = 1;
}

enum TerminateSource {
  TERMINATE_SOURCE_USER_CANCEL = 0;
  TERMINATE_SOURCE_NORMAL_COMPLETION = 1;
  TERMINATE_SOURCE_FRONTEND_DISCONNECT = 2;
}

enum OperationType {
  Overwrite = 0;
  Add = 1;
  Delete = 2;
}

enum ModifyField {
  // user and account
  Partition = 0;
  Qos = 1;
  DefaultQos = 2;
  Description = 3;  // account and qos
  // user
  AdminLevel = 4;
  DefaultAccount = 5;
  // qos
  Priority = 6;
  MaxJobsPerUser = 7;
  MaxCpusPerUser = 8;
  MaxTimeLimitPerJob = 9;
  MaxJobsPerAccount = 10;
  MaxSubmitJobsPerUser = 11;
  MaxSubmitJobsPerAccount = 12;
  MaxJobs = 13;
  MaxSubmitJobs = 14;
  MaxWall = 15;
  MaxTres = 16;
  MaxTresPerUser = 17;
  MaxTresPerAccount = 18;
  Flags = 19;

  // wckey
  DefaultWckey = 40;
}

message AccountInfo {
  string name = 1;
  string description = 2;
  repeated string users = 3;
  repeated string child_accounts = 4;
  string parent_account = 5;
  repeated string allowed_partitions = 6;
  string default_qos = 7;
  repeated string allowed_qos_list = 8;
  repeated string coordinators = 9;
  bool blocked = 10;
}

// Note: UserInfo DIFFERS from the `User` struct in C++ code and database representation
//       and is ONLY used for communication between CraneCtld and cacctmgr command.
//       If an user belongs to multiple accounts, There will be multiple `UserInfo`
//       messages with `account` pointing to each account.
//       For example, if a user (uid=1) belongs to accounts `1,2,3`,
//       there will be three `UserInfo` messages: (uid=1, account=1), (uid=1, account=2),
//       (uid=1, account=3).
//       The c++ code and database representation use a Map<account name, AttrsInAccount> to contain
//       in ONE UserInfo message all the information belonging to different accounts.
message UserInfo {
  enum AdminLevel {
    None = 0;
    Operator = 1;
    Admin = 2;
    Root = 3;
  };
  message AllowedPartitionQos {
    string partition_name = 1;
    repeated string qos_list = 2;
    string default_qos = 3;
  }

  uint32 uid = 1;
  string name = 2;
  string account = 3;
  bool blocked = 4;
  repeated AllowedPartitionQos allowed_partition_qos_list = 5;
  repeated string coordinator_accounts = 6;
  AdminLevel admin_level = 7;
}

message QosInfo {
  string name = 1;
  string description = 2;
  uint32 priority = 3;
  uint32 max_jobs_per_user = 4;
  double max_cpus_per_user = 5;
  uint64 max_time_limit_per_job = 6;
  uint32 max_jobs_per_account = 7;
  uint32 max_submit_jobs_per_user = 8;
  uint32 max_submit_jobs_per_account = 9;
  uint32 max_jobs = 10;
  uint32 max_submit_jobs = 11;
  uint64 max_wall = 12;
  ResourceView max_tres = 13;
  ResourceView max_tres_per_user = 14;
  ResourceView max_tres_per_account = 15;
  uint32 flags = 16;
}

message QueryWckeyInfo {
  string name = 1;
  string cluster = 2;
  string user_name = 3;
  bool is_default = 4;
}

message WckeyInfo {
  string name = 1;
  string user_name = 2;
  bool is_default = 3;
}

message TimeInterval {
  google.protobuf.Timestamp lower_bound = 1;
  google.protobuf.Timestamp upper_bound = 2;
}

message SystemRelInfo {
  string name = 1;
  string release = 2;
  string version = 3;
}

message NetworkInterface {
  string name = 1;
  string mac_address = 2;
  repeated string ipv4_addresses = 3;
  repeated string ipv6_addresses = 4;
}

message CranedRemoteMeta {
  DedicatedResourceInNode dres_in_node = 1;
  SystemRelInfo sys_rel_info = 2;
  string craned_version = 3;
  google.protobuf.Timestamp craned_start_time = 4;
  google.protobuf.Timestamp system_boot_time = 5;
  message Steps {
    repeated uint32 steps = 1;
  }
  map<uint32, Steps> lost_steps = 6;
  repeated uint32 lost_jobs = 7;
  repeated NetworkInterface network_interfaces = 8;
  uint32 config_crc = 9;
}

enum TxnAction {
  AddAccount = 0;
  ModifyAccount = 1;
  DeleteAccount = 2;
  AddUser = 3;
  ModifyUser = 4;
  DeleteUser = 5;
  AddQos = 6;
  ModifyQos = 7;
  DeleteQos = 8;
}

message LicenseInfo {
  string name = 1;
  uint32 total = 2;
  uint32 used = 3;
  uint32 free = 4;
  uint32 reserved = 5;
  bool remote = 6;
  uint32 last_consumed = 7;
  uint32 last_deficit = 8;
  int64 last_update = 9;
}

message LicenseResourceInfo {
  string resource_name = 1;
  map<string, uint32> cluster_resource_info = 2;
  uint32 count = 3;
  string server = 4;
  string server_type = 5;
  LicenseResource.Type type = 6;
  string description = 7;
  uint32 last_consumed = 8;
  uint32 allocated = 9;
  uint32 flags = 10;
}

message LicenseResource {
  enum Type {
    NotSet = 0;
    License = 1;
  }

  enum Field {
    Count = 0;
    Allowed = 1;
    LastConsumed = 2;
    Description = 3;
    Flags = 4;
    ServerType = 5;
    ResourceType = 6;
  }

  enum Flag {
    None = 0;
    Absolute = 1;
  }
}

