syntax = "proto3";

package crane.grpc.plugin; 
option go_package = "/protos";

import "PublicDefs.proto";

message PreStartHookRequest {
  repeated TaskInfo task_info_list = 1;
}

message PreStartHookReply {
  message TaskIdReply {
    bool ok = 1;
    uint32 task_id = 2;
    string failure_reason = 3;
  }

  repeated TaskIdReply result = 1;
}

message PostStartHookRequest {
  repeated TaskInfo task_info_list = 1;
}

message PostStartHookReply {
  message TaskIdReply {
    bool ok = 1;
    uint32 task_id = 2;
    string failure_reason = 3;
  }

  repeated TaskIdReply result = 1;
}

message PreEndHookRequest {
  repeated TaskInfo task_info_list = 1;
}

message PreEndHookReply {
  message TaskIdReply {
    bool ok = 1;
    uint32 task_id = 2;
    string failure_reason = 3;
  }

  repeated TaskIdReply result = 1;
}

message PostEndHookRequest {
  repeated TaskInfo task_info_list = 1;
}

message PostEndHookReply {
  message TaskIdReply {
    bool ok = 1;
    uint32 task_id = 2;
    string failure_reason = 3;
  }

  repeated TaskIdReply result = 1;
}


service CranePluginD {
  /* ----------------------------------- Called from CraneCtld ---------------------------------------------------- */  
  rpc PreStartHook(PreStartHookRequest) returns (PreStartHookReply);
  rpc PostStartHook(PostStartHookRequest) returns (PostStartHookReply);
  
  rpc PreEndHook(PreEndHookRequest) returns (PreEndHookReply);
  rpc PostEndHook(PostEndHookRequest) returns (PostEndHookReply);
}
